name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        working-directory: backend
        run: pip install ".[dev]"
      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .
        continue-on-error: true
      - name: Tests
        working-directory: backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend
        working-directory: frontend
        run: npm install
      - name: Build
        working-directory: frontend
        run: npm run build
