name: marketlens

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketlens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketlens"]
      interval: 5s
      timeout: 5s
      retries: 12

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  # one-shot: pull the local model so the agent is ready to answer
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["sh", "-c", "ollama pull ${MARKETLENS_LLM__OLLAMA_MODEL:-qwen2.5}"]
    restart: "no"

  backend:
    build: ./backend
    env_file: .env
    environment:
      MARKETLENS_DB__HOST: db
      MARKETLENS_LLM__OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["sh", "-c", "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000"]

  # one-shot: run migrations, fetch + embed SEC filings / news, seed demo portfolio
  ingest:
    build: ./backend
    env_file: .env
    environment:
      MARKETLENS_DB__HOST: db
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && python -m ingestion.cli all"]
    restart: "no"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      # the browser talks to the API directly on the host
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  pgdata:
  ollama:
